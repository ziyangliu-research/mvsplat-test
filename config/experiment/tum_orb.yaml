# @package _global_

defaults:
  - override /dataset: tum_orb
  - override /model/encoder: costvolume
  - override /loss: [mse, lpips]

wandb:
  name: tum_orb
  tags: [tum_orb, debug, 256x256]

# TUM 单序列 / 小数据，先用小 batch 做最小可运行验证
data_loader:
  train:
    batch_size: 1
  val:
    batch_size: 1
  test:
    batch_size: 1

trainer:
  # 如果你只是先调试 pipeline，这里没必要很大
  # 真正训练时你可以再加大
  max_steps: 50_001

# ----- 保留和官方 re10k 接近的模型默认设置 -----
model:
  encoder:
    num_depth_candidates: 128
    costvolume_unet_feat_dim: 128
    costvolume_unet_channel_mult: [1,1,1]
    costvolume_unet_attn_res: [4]
    gaussians_per_pixel: 1
    depth_unet_feat_dim: 32
    depth_unet_attn_res: [16]
    depth_unet_channel_mult: [1,1,1,1,1]

# lpips loss
loss:
  lpips:
    apply_after_step: 0
    weight: 0.05

# 这里再次覆盖 dataset 的关键字段，和官方 experiment 风格保持一致
dataset:
  image_shape: [256, 256]
  near: 0.1
  far: 8.0

test:
  eval_time_skip_steps: 5
  compute_scores: false
  save_image: true
  save_video: false