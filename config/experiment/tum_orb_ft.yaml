# @package _global_

defaults:
  - override /dataset: tum_orb_f1_train
  - override /model/encoder: costvolume
  - override /loss: [mse, lpips]

wandb:
  name: tum_orb_ft_from_re10k
  tags: [tum_orb, finetune, re10k_init, 256x256]

data_loader:
  train:
    batch_size: 1
  val:
    batch_size: 1
  test:
    batch_size: 1

trainer:
  max_steps: 20001

model:
  encoder:
    num_depth_candidates: 128
    costvolume_unet_feat_dim: 128
    costvolume_unet_channel_mult: [1, 1, 1]
    costvolume_unet_attn_res: [4]
    gaussians_per_pixel: 1
    depth_unet_feat_dim: 32
    depth_unet_attn_res: [16]
    depth_unet_channel_mult: [1, 1, 1, 1, 1]

loss:
  lpips:
    apply_after_step: 0
    weight: 0.05

dataset:
  image_shape: [256, 256]
  near: 0.1
  far: 8.0
  frame_stride: 1
  train_split_ratio: 0.7
  val_split_ratio: 0.15
  test_split_ratio: 0.15

test:
  eval_time_skip_steps: 5
  compute_scores: false
  save_image: true
  save_video: false